<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list lines="full">
    <ion-list-header>
      <ion-label>Support</ion-label>
    </ion-list-header>

    <ion-item button (click)="openUserGuide()" detail="true">
      <ion-icon slot="start" name="help-circle-outline" color="secondary"></ion-icon>
      <ion-label>
        <h2>User Guide</h2>
        <p>How CipherKeep protects your data</p>
      </ion-label>
    </ion-item>
  </ion-list>


  <ion-list lines="full" class="ion-margin-bottom">
    <ion-list-header>
      <ion-label>Security</ion-label>
    </ion-list-header>

    <ion-item button (click)="changePin()" detail="true">
      <ion-icon slot="start" name="key-outline" color="primary"></ion-icon>
      <ion-label>
        <h2>Change Fallback PIN</h2>
        <p>Update your backup access code</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-list lines="full">
    <ion-list-header>
      <ion-label color="danger">Danger Zone</ion-label>
    </ion-list-header>

    <ion-item button (click)="triggerFullWipe()" detail="false" class="danger-item">
      <ion-icon slot="start" name="trash-outline"></ion-icon>
      <ion-label>
        <h2>Full Local Wipe</h2>
        <p>Delete all secrets and reset app</p>
      </ion-label>
    </ion-item>
  </ion-list>


</ion-content>
